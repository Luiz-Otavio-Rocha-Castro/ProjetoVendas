spring.application.name=vendas

# 1. URL do banco de dados (Variáveis de Ambiente para segurança)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/controle-vendas}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:otavio01}

# 4. Dialeto e inicialização
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 5. JWT
projeto.jwtSecret=${JWT_SECRET:bxOksa8BHgdAhR80Y3pEYvS5M+MnF2sheFDqprkTqQ4odqoszJLW1ikw64/nT/dTvlgrcBTq7HfK1B9Gai2h5A==}
projeto.jwtExpirationMs=86400000

# 6. Configurações de Pool de Conexão (HikariCP)
# Essencial para conexões remotas (ex: Supabase) para evitar falhas por conexões inativas (stale connections)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# 7. Upload de documentos (PDFs)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB