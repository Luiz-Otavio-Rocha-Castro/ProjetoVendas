spring.application.name=vendas

# 1. URL do banco de dados (Variáveis de Ambiente para segurança)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/controle-vendas}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:otavio01}

# 4. Dialeto e inicialização
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

